<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WA Sender — Minimal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/index.css">
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </div>
    WA Sender
  </div>
  <div class="flex-row">
    <button class="btn btn-ghost btn-sm" id="themeToggle" type="button" onclick="toggleTheme()" aria-label="Ganti tema"></button>
    <a class="btn btn-ghost btn-sm" href="/admin/login" aria-label="Login Admin">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Admin Login
    </a>
    <div class="header-badge"><span class="live-dot"></span> &nbsp;READY</div>
  </div>
</header>

<div class="app">

  <div class="panel" style="animation-delay:0s">
    <div class="panel-header">
      <div class="panel-title">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Compose
      </div>
    </div>
    <div class="panel-body">

      <div>
        <label>Recipient</label>
        <div class="phone-row">
          <select class="country-code" id="countryCode">
            <option value="62">🇮🇩 +62</option>
            <option value="1">🇺🇸 +1</option>
            <option value="44">🇬🇧 +44</option>
            <option value="65">🇸🇬 +65</option>
            <option value="60">🇲🇾 +60</option>
            <option value="61">🇦🇺 +61</option>
            <option value="81">🇯🇵 +81</option>
            <option value="82">🇰🇷 +82</option>
            <option value="86">🇨🇳 +86</option>
            <option value="91">🇮🇳 +91</option>
          </select>
          <input type="tel" id="phoneNumber" placeholder="812-3456-7890" style="flex:1">
        </div>
      </div>

      <div>
        <label>Format</label>
        <div class="fmt-toolbar">
          <button class="fmt-btn" onclick="wrapText('*','*')" title="Bold">B</button>
          <button class="fmt-btn" onclick="wrapText('_','_')" title="Italic" style="font-style:italic">I</button>
          <button class="fmt-btn" onclick="wrapText('~','~')" title="Strikethrough" style="text-decoration:line-through">S</button>
          <button class="fmt-btn" onclick="wrapText('```','```')" title="Monospace" style="font-family:monospace;font-size:10px">{ }</button>
          <div class="fmt-sep"></div>
          <button class="fmt-btn" onclick="insertText('\n• ')" title="Bullet">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor"/><circle cx="4" cy="12" r="1.5" fill="currentColor"/><circle cx="4" cy="18" r="1.5" fill="currentColor"/></svg>
          </button>
          <button class="fmt-btn" onclick="clearMsg()" title="Clear">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
          </button>
        </div>
      </div>

      <div class="message-wrap flex-1">
        <label>Message</label>
        <textarea id="message" placeholder="Tulis pesan Anda di sini..." oninput="updatePreview(); updateCharCount()"></textarea>
        <div class="msg-meta"><span id="charCount">0</span> karakter</div>
      </div>

      <div class="char-bar"><div class="char-bar-fill" id="charBar" style="width:0%"></div></div>

      <div>
        <label>Form Link</label>
        <div class="flex-row">
          <input type="checkbox" id="useFormLink" style="width:auto;flex:0">
          <input type="text" id="formLinkText" placeholder="Contoh: Isi data diri di sini" style="flex:1">
        </div>
      </div>

    </div>
  </div>

  <div class="panel" style="animation-delay:0.07s">
    <div class="panel-header">
      <div class="panel-title">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 13s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
        Emoji & Preview
      </div>
    </div>
    <div class="panel-body">

      <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
        <label>Preview</label>
        <div class="preview-bubble" id="preview">Pesan Anda akan tampil di sini...</div>
      </div>

      <div class="divider"></div>

      <div>
        <div class="emoji-toggle" onclick="toggleEmoji()">
          <span><span>😊</span> <span>Emoji</span></span>
          <span class="emoji-toggle-icon" id="emojiToggleIcon">Tampilkan ▼</span>
        </div>
        <div id="emojiContainer" class="emoji-section hidden">
          <div class="emoji-tabs">
            <button class="etab active" onclick="showEmojiCat(0,this)">😊</button>
            <button class="etab" onclick="showEmojiCat(1,this)">🎉</button>
            <button class="etab" onclick="showEmojiCat(2,this)">💼</button>
            <button class="etab" onclick="showEmojiCat(3,this)">❤️</button>
            <button class="etab" onclick="showEmojiCat(4,this)">🌟</button>
            <button class="etab" onclick="showEmojiCat(5,this)">🤝</button>
          </div>
          <div class="emoji-grid" id="emojiGrid"></div>
        </div>
      </div>

      <div class="divider"></div>

      <button class="btn btn-primary" onclick="sendMessage()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Kirim via WhatsApp
      </button>

    </div>
  </div>

  <div class="panel" style="animation-delay:0.14s">
    <div class="panel-header">
      <div class="panel-title">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
        Templates
      </div>
      <span style="font-family:var(--mono);font-size:10px;color:var(--text-dim)" id="tplCount">0 saved</span>
    </div>
    <div class="panel-body">

      <div>
        <label>Save Current</label>
        <div class="save-tpl-row">
          <input type="text" id="tplName" placeholder="Nama template...">
          <button class="btn btn-ghost btn-sm" onclick="saveTemplate()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Save
          </button>
        </div>
      </div>

      <div class="divider"></div>

      <div style="flex:1; overflow:hidden; display:flex; flex-direction:column; gap:8px;">
        <label>Saved Templates</label>
        <div class="template-list" id="templateList"></div>
        <div id="tplEmpty" style="text-align:center;padding:20px 0;font-family:var(--mono);font-size:11px;color:var(--text-dim);">
          Belum ada template tersimpan
        </div>
      </div>

      <div class="divider"></div>

      <div>
        <label>Session Info</label>
        <div style="display:flex;flex-direction:column;gap:6px;">
          <div class="send-info-row">
            <span class="send-info-label">Terkirim hari ini</span>
            <span class="send-info-val" id="sentCount">0</span>
          </div>
          <div class="send-info-row">
            <span class="send-info-label">Templates</span>
            <span class="send-info-val" id="tplCountVal">0</span>
          </div>
        </div>
      </div>

    </div>
  </div>

</div>

<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span id="toastMsg"></span>
</div>

<script src="/static/js/theme.js"></script>
<script src="/static/js/emoji.js"></script>
<script src="/static/js/message.js"></script>
<script src="/static/js/templates.js"></script>
<script src="/static/js/send.js"></script>
</body>
</html>
